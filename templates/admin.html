<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel Administrador</title>

<script src="https://cdn.jsdelivr.net/npm/winwheel@2.8.0/dist/Winwheel.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#1c1c1c;
color:white;
}

h1{
margin-top:20px;
}

.jugador{
margin:5px;
padding:6px;
background:#333;
border-radius:6px;
}

button{
padding:10px 15px;
margin:8px;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
}

#ruleta{
display:block;
margin:auto;
}

#resultado{
font-size:28px;
margin-top:20px;
color:yellow;
}

</style>

</head>

<body>

<h1>🎮 Panel Administrador</h1>

<h2>Jugadores</h2>

<div>

{% for numero, jugador in numeros.items() %}

<div class="jugador">

<strong>{{numero}}</strong> - {{jugador}}

<form method="POST" style="display:inline">
<input type="hidden" name="accion" value="liberar">
<input type="hidden" name="numero" value="{{numero}}">
<button>❌ Liberar</button>
</form>

</div>

{% endfor %}

</div>

<hr>

<h2>🎡 Ruleta del ganador</h2>

<div id="ruleta-box">

<canvas id="ruleta" width="500" height="500"></canvas>

<br>

<button onclick="girar()">🎰 Girar ruleta</button>
<button onclick="pantallaCompleta()">🖥 Pantalla completa</button>

<h2 id="resultado"></h2>

</div>

<hr>

<form method="POST" action="/reset">
<input type="password" name="password" placeholder="Contraseña admin">
<button type="submit">🔄 Reiniciar juego</button>
</form>

<script>

let jugadores = [
{% for numero, jugador in numeros.items() %}
{ text: "{{numero}} - {{jugador}}", fillStyle:"#"+(Math.random()*0xFFFFFF<<0).toString(16) },
{% endfor %}
]

if(jugadores.length === 0){
jugadores = [{text:"Sin jugadores"}]
}

let rueda = new Winwheel({
numSegments: jugadores.length,
outerRadius: 220,
textFontSize: 14,
segments: jugadores,
animation:{
type:"spinToStop",
duration:6,
spins:8,
callbackFinished:mostrarGanador
}
})

rueda.draw()

function girar(){

if(jugadores.length === 0){
alert("No hay jugadores")
return
}

rueda.stopAnimation(false)
rueda.rotationAngle = 0
rueda.draw()

rueda.startAnimation()

}

function mostrarGanador(segmento){

document.getElementById("resultado").innerHTML =
"🏆 GANADOR: " + segmento.text

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
})

}

function pantallaCompleta(){

let elem = document.documentElement

if(elem.requestFullscreen){
elem.requestFullscreen()
}

}

</script>

</body>
</html>
