<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Panel Administrador</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#1c1c1c;
color:white;
}

h1{
margin-top:20px;
}

.jugador{
margin:5px;
padding:6px;
background:#333;
border-radius:6px;
}

button{
padding:12px 18px;
margin:8px;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
}

canvas{
background:#111;
border-radius:50%;
margin-top:20px;
}

#resultado{
font-size:32px;
margin-top:20px;
color:yellow;
}

</style>

</head>

<body>

<h1>🎮 Panel Administrador</h1>

<h2>Jugadores</h2>

<div>

{% for numero, jugador in numeros.items() %}

<div class="jugador">

<strong>{{numero}}</strong> - {{jugador.nombre}}

{% if jugador.pagado %}
<span style="color:#2ecc71">✅ Pagado</span>
{% else %}
<span style="color:orange">⏳ Pendiente</span>

<button onclick="confirmarPago('{{numero}}')">
💰 Confirmar pago
</button>

{% endif %}

<form method="POST" style="display:inline">
<input type="hidden" name="accion" value="liberar">
<input type="hidden" name="numero" value="{{numero}}">
<button>❌ Liberar</button>
</form>

</div>

{% endfor %}

</div>

<hr>

<h2>🎡 Ruleta del ganador</h2>

<canvas id="ruleta" width="500" height="500"></canvas>

<br>

<button onclick="girar()">🎰 Girar ruleta</button>
<button onclick="pantallaCompleta()">🖥 Pantalla completa</button>

<h2 id="resultado"></h2>

<hr>

<form method="POST" action="/reset">
<input type="password" name="password" placeholder="Contraseña admin">
<button type="submit">🔄 Reiniciar juego</button>
</form>

<script>

function confirmarPago(numero){

fetch("/confirmar/"+numero,{
method:"POST"
})
.then(r=>r.json())
.then(data=>{

if(data.ok){
alert("Pago confirmado")
location.reload()
}

})

}

const canvas = document.getElementById("ruleta")
const ctx = canvas.getContext("2d")

let jugadores = [
{% for numero, jugador in numeros.items() %}
"{{numero}} - {{jugador.nombre}}",
{% endfor %}
]

if(jugadores.length === 0){
jugadores = ["Sin jugadores"]
}

let angulo = 0
let girando = false

function dibujarRuleta(){

let total = jugadores.length
let anguloSegmento = (2*Math.PI)/total

for(let i=0;i<total;i++){

let inicio = i*anguloSegmento + angulo
let fin = inicio + anguloSegmento

ctx.beginPath()
ctx.moveTo(250,250)
ctx.arc(250,250,240,inicio,fin)
ctx.fillStyle = `hsl(${i*360/total},70%,50%)`
ctx.fill()

ctx.save()

ctx.translate(250,250)
ctx.rotate(inicio + anguloSegmento/2)

ctx.fillStyle="white"
ctx.font="14px Arial"
ctx.fillText(jugadores[i],120,5)

ctx.restore()

}

}

function dibujarPuntero(){

ctx.fillStyle="white"

ctx.beginPath()
ctx.moveTo(250,10)
ctx.lineTo(230,40)
ctx.lineTo(270,40)
ctx.fill()

}

function render(){

ctx.clearRect(0,0,500,500)

dibujarRuleta()
dibujarPuntero()

requestAnimationFrame(render)

}

render()

function girar(){

if(girando) return

girando=true

let velocidad = Math.random()*0.3 + 0.35
let friccion = 0.991

let animacion = setInterval(()=>{

angulo += velocidad
velocidad *= friccion

if(velocidad < 0.002){

clearInterval(animacion)
girando=false
calcularGanador()

}

},16)

}

function calcularGanador(){

let total = jugadores.length
let anguloSegmento = (2*Math.PI)/total

let indice = Math.floor(total - (angulo%(2*Math.PI))/anguloSegmento) % total

let ganador = jugadores[indice]

document.getElementById("resultado").innerHTML =
"🏆 GANADOR: " + ganador

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
})

}

function pantallaCompleta(){

let elem = document.documentElement

if(elem.requestFullscreen){
elem.requestFullscreen()
}

}

</script>

</body>
</html>
