<!DOCTYPE html>
<html>

<head>

<title>Sorteo Safari</title>

<script src="https://cdn.jsdelivr.net/npm/winwheel@2.8.0/Winwheel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/Tween.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

canvas{
margin-top:30px;
background:white;
border-radius:50%;
}

#flecha{
font-size:50px;
color:red;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
font-weight:bold;
}

#contador{
font-size:40px;
margin-top:20px;
color:#00ffcc;
}

#ganador{
font-size:45px;
margin-top:30px;
color:gold;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🎰 SORTEO SAFARI 🎰</h1>

<div id="contador">Esperando sorteo...</div>

<div id="flecha">▼</div>

<canvas id="ruleta" width="500" height="500"></canvas>

<br>

<button onclick="girar()">Girar</button>

<div id="ganador">
Esperando ganador...
</div>

<audio id="sonidoRuleta" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

<script>

let rueda
let yaGiro = false

fetch("/estado")
.then(res=>res.json())
.then(data=>{

let jugadores = Object.entries(data)

if(jugadores.length === 0){

document.getElementById("ganador").innerText =
"No hay participantes aún"

return

}

let segmentos = []

let colores = [
"#ff0000","#ff9900","#ffff00","#00ff00",
"#00ffff","#0066ff","#9900ff","#ff00ff"
]

jugadores.forEach(([numero,nombre],i)=>{

segmentos.push({
text: numero + " - " + nombre,
fillStyle: colores[i % colores.length]
})

})

rueda = new Winwheel({

canvasId:'ruleta',

numSegments:segmentos.length,

outerRadius:230,

textFontSize:16,

segments:segmentos,

animation:{
type:'spinToStop',
duration:6,
spins:10,
callbackFinished:mostrarGanador
}

})

})

function girar(){

if(!rueda) return

document.getElementById("ganador").innerText="Girando..."

document.getElementById("sonidoRuleta").play()

rueda.startAnimation()

}

function mostrarGanador(segmento){

document.getElementById("ganador").innerText =
"🏆 GANADOR: " + segmento.text

confetti({
particleCount:200,
spread:120
})

}

function actualizarContador(){

let ahora = new Date()

let objetivo = new Date()

objetivo.setHours(20)
objetivo.setMinutes(0)
objetivo.setSeconds(0)

if(ahora > objetivo){
objetivo.setDate(objetivo.getDate()+1)
}

let diferencia = objetivo - ahora

let horas = Math.floor(diferencia/1000/60/60)
let minutos = Math.floor((diferencia/1000/60)%60)
let segundos = Math.floor((diferencia/1000)%60)

document.getElementById("contador").innerText =
"⏳ Sorteo en: "+
String(horas).padStart(2,"0")+":"+
String(minutos).padStart(2,"0")+":"+
String(segundos).padStart(2,"0")

if(horas===0 && minutos===0 && segundos===0 && !yaGiro){

yaGiro = true
girar()

}

}

setInterval(actualizarContador,1000)

</script>

</body>
</html>
