<!DOCTYPE html>
<html>

<head>

<title>Sorteo Safari</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
margin-top:40px;
background:white;
border-radius:50%;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
font-weight:bold;
}

#ganador{
font-size:40px;
margin-top:30px;
color:gold;
}

</style>

</head>

<body>

<h1>🎰 SORTEO SAFARI 🎰</h1>

<canvas id="ruleta" width="500" height="500"></canvas>

<br>

<button onclick="girar()">Girar</button>

<div id="ganador">
Cargando jugadores...
</div>

<script>

let canvas = document.getElementById("ruleta")
let ctx = canvas.getContext("2d")

let jugadores = []
let anguloActual = 0
let girando = false

async function cargarJugadores(){

let res = await fetch("https://numeros-server.onrender.com/estado")

let data = await res.json()

jugadores = Object.entries(data)

if(jugadores.length === 0){

document.getElementById("ganador").innerText =
"No hay jugadores"

return
}

dibujarRuleta()

document.getElementById("ganador").innerText =
"Jugadores cargados: " + jugadores.length

}

function dibujarRuleta(){

let radio = canvas.width/2
let angulo = 2*Math.PI / jugadores.length

ctx.clearRect(0,0,canvas.width,canvas.height)

jugadores.forEach((j,i)=>{

let inicio = angulo*i + anguloActual
let fin = inicio + angulo

ctx.beginPath()
ctx.moveTo(radio,radio)
ctx.arc(radio,radio,radio,inicio,fin)
ctx.fillStyle = `hsl(${i*40},80%,60%)`
ctx.fill()
ctx.stroke()

ctx.save()
ctx.translate(radio,radio)
ctx.rotate(inicio + angulo/2)
ctx.fillStyle="black"
ctx.font="14px Arial"
ctx.fillText(j[0]+"-"+j[1],radio/2,5)
ctx.restore()

})

}

function girar(){

if(girando) return

girando = true

let velocidad = Math.random()*0.3 + 0.4
let tiempo = 0

function animar(){

anguloActual += velocidad

velocidad *= 0.99

dibujarRuleta()

tiempo++

if(velocidad < 0.002){

girando = false

let angulo = 2*Math.PI / jugadores.length
let index = Math.floor((2*Math.PI - anguloActual % (2*Math.PI)) / angulo)

let ganador = jugadores[index]

document.getElementById("ganador").innerText =
"🏆 GANADOR: "+ganador[0]+" - "+ganador[1]

return
}

requestAnimationFrame(animar)

}

animar()

}

cargarJugadores()

</script>

</body>

</html>
