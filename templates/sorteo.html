<!DOCTYPE html>
<html>

<head>

<title>Sorteo Safari</title>

<script src="https://cdn.jsdelivr.net/npm/winwheel@2.8.0/Winwheel.min.js"></script>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
margin-top:40px;
background:white;
border-radius:50%;
}

button{
margin-top:30px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
}

#ganador{
font-size:40px;
margin-top:30px;
color:gold;
}

</style>

</head>

<body>

<h1>🎰 SORTEO SAFARI 🎰</h1>

<canvas id="ruleta" width="500" height="500"></canvas>

<br>

<button onclick="girar()">Girar</button>

<div id="ganador">
Esperando ganador...
</div>

<script>

let rueda = null;

fetch("/estado")
.then(res => res.json())
.then(data => {

let jugadores = Object.entries(data);

if(jugadores.length === 0){

document.getElementById("ganador").innerText =
"No hay participantes aún";

return;

}

let segmentos = [];

jugadores.forEach(([numero,nombre]) => {

segmentos.push({
text: numero + " - " + nombre
})

});

rueda = new Winwheel({

canvasId:'ruleta',

numSegments:segmentos.length,

segments:segmentos,

animation:{
type:'spinToStop',
duration:5,
spins:8,
callbackFinished:mostrarGanador
}

});

})

function girar(){

if(!rueda){
alert("La ruleta aún no cargó jugadores");
return;
}

rueda.startAnimation();

}

function mostrarGanador(segmento){

document.getElementById("ganador").innerText =
"🏆 " + segmento.text;

}

</script>

</body>
</html>
