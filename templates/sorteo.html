<!DOCTYPE html>
<html>

<head>

<title>Sorteo Safari</title>

<script src="https://cdn.jsdelivr.net/npm/winwheel@2.8.0/Winwheel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/Tween.min.js"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

canvas{
margin-top:30px;
background:white;
border-radius:50%;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffd700;
}

#ganador{
font-size:45px;
margin-top:30px;
color:gold;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🎰 SORTEO SAFARI 🎰</h1>

<canvas id="ruleta" width="500" height="500"></canvas>

<br>

<button onclick="girar()">Girar</button>

<div id="ganador">
Esperando ganador...
</div>

<script>

let rueda

fetch("/estado")
.then(res=>res.json())
.then(data=>{

let jugadores = Object.entries(data)

if(jugadores.length === 0){

document.getElementById("ganador").innerText =
"No hay participantes aún"

return

}

let segmentos = []

jugadores.forEach(([numero,nombre])=>{

segmentos.push({
text: numero + " - " + nombre
})

})

rueda = new Winwheel({

canvasId:'ruleta',

numSegments:segmentos.length,

outerRadius:230,

textFontSize:16,

segments:segmentos,

animation:{
type:'spinToStop',
duration:6,
spins:10,
callbackFinished:mostrarGanador
}

})

})


function girar(){

if(!rueda){
alert("No hay jugadores aún")
return
}

document.getElementById("ganador").innerText="Girando..."

rueda.startAnimation()

}


function mostrarGanador(segmento){

document.getElementById("ganador").innerText =
"🏆 GANADOR: " + segmento.text

}

</script>

</body>
</html>
