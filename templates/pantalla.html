<!DOCTYPE html>

<html>

<head>

<title>Pantalla Sorteo</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:80px;
margin-bottom:40px;
}

#contador{
font-size:90px;
color:#00ffcc;
margin-bottom:40px;
}

#ganador{
font-size:120px;
color:gold;
font-weight:bold;
}

#hora{
margin-top:40px;
font-size:40px;
color:#ccc;
}

</style>

</head>

<body>

<h1>🎰 SORTEO SAFARI 🎰</h1>

<div id="contador">
Calculando próximo sorteo...
</div>

<div id="ganador">
Esperando ganador...
</div>

<div id="hora"></div>

<audio id="sonido">
<source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let ultimo = ""

function proximoSorteo(){

let ahora = new Date()

let horarios = [13,15,18]

for(let h of horarios){

let objetivo = new Date()

objetivo.setHours(h)
objetivo.setMinutes(0)
objetivo.setSeconds(0)

if(objetivo > ahora){
return objetivo
}

}

let mañana = new Date()

mañana.setDate(mañana.getDate()+1)
mañana.setHours(13)
mañana.setMinutes(0)
mañana.setSeconds(0)

return mañana

}

function actualizarContador(){

let objetivo = proximoSorteo()

let ahora = new Date()

let diff = objetivo - ahora

let horas = Math.floor(diff/1000/60/60)
let minutos = Math.floor(diff/1000/60)%60
let segundos = Math.floor(diff/1000)%60

document.getElementById("contador").innerText =
"⏳ Próximo sorteo en\n"+
horas.toString().padStart(2,"0")+":"+
minutos.toString().padStart(2,"0")+":"+
segundos.toString().padStart(2,"0")

}

async function verificarGanador(){

let res = await fetch("/ultimo-ganador")

let data = await res.json()

if(data.numero){

let texto = "🏆 GANADOR: " + data.numero + " - " + data.nombre

if(texto !== ultimo){

ultimo = texto

let div = document.getElementById("ganador")

div.innerText = texto

document.getElementById("sonido").play()

confetti({
particleCount:300,
spread:150,
origin:{y:0.6}
})

}

}

}

function reloj(){

let ahora = new Date()

document.getElementById("hora").innerText =
ahora.toLocaleTimeString()

}

setInterval(actualizarContador,1000)

setInterval(reloj,1000)

setInterval(verificarGanador,4000)

actualizarContador()
reloj()
verificarGanador()

</script>

</body>

</html>
