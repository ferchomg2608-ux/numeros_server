<!DOCTYPE html>

<html>

<head>

<title>Pantalla Sorteo</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

h1{
font-size:80px;
margin-bottom:40px;
}

#ganador{
font-size:120px;
color:gold;
font-weight:bold;
transition:all 0.6s ease;
}

.animacion{
transform:scale(1.3);
text-shadow:0 0 40px gold;
}

#hora{
margin-top:40px;
font-size:40px;
color:#ccc;
}

</style>

</head>

<body>

<h1>🎰 SORTEO SAFARI 🎰</h1>

<div id="ganador">
Esperando ganador...
</div>

<div id="hora"></div>

<audio id="sonido">
<source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let ultimo = ""

async function verificarGanador(){

try{

let res = await fetch("/ultimo-ganador")
let data = await res.json()

if(data.numero){

let texto = "🏆 GANADOR: " + data.numero + " - " + data.nombre

if(texto !== ultimo){

ultimo = texto

let div = document.getElementById("ganador")

div.innerText = texto

div.classList.add("animacion")

document.getElementById("sonido").play()

confetti({
particleCount:300,
spread:150,
origin:{y:0.6}
})

setTimeout(()=>{
div.classList.remove("animacion")
},2000)

}

}

}catch(e){}

}

function reloj(){

let ahora = new Date()

document.getElementById("hora").innerText =
ahora.toLocaleTimeString()

}

setInterval(verificarGanador,4000)

setInterval(reloj,1000)

verificarGanador()
reloj()

</script>

</body>

</html>
