<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Números</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        input[name="nombre"], input[name="password"] {
            padding: 5px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #444;
            border-radius: 10px;
            background-color: #f0f0f0;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: #d0f0d0;
            transform: scale(1.05);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h2>Elige tu número</h2>

<!-- Nombre del jugador -->
<form id="nombre-form">
    <input type="text" name="nombre" placeholder="Tu nombre" required>
</form>

<!-- Reinicio solo admin -->
<form method="POST" action="/reset" style="margin-bottom: 20px;">
    <input type="password" name="password" placeholder="Contraseña admin">
    <button type="submit" style="background-color: #ffaaaa;">🔄 Reiniciar juego</button>
</form>

<div id="numeros-container">
    {% set animales = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯"] %}
    {% for numero in range(1, 101) %}
        <form method="POST" action="/pick" style="display:inline;">
            <input type="hidden" name="numero" value="{{ numero }}">
            <input type="hidden" name="nombre" value="">
            <button type="submit" {% if numero|string in numeros %}disabled{% endif %}>
                {{ numero }} {{ animales[(numero-1) % 10] }}
            </button>
        </form>
    {% endfor %}
</div>

<script>
    // Poner el nombre del jugador en cada formulario antes de enviar
    const nombreInput = document.querySelector('input[name="nombre"]');
    const forms = document.querySelectorAll('#numeros-container form');

    forms.forEach(form => {
        form.addEventListener('submit', e => {
            const hidden = form.querySelector('input[name="nombre"]');
            hidden.value = nombreInput.value || "Jugador";
        });
    });
</script>

</body>
</html>
