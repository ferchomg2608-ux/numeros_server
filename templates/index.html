<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Números</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        button {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #444;
            border-radius: 10px;
            background-color: #f0f0f0;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #d0f0d0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<h2>Elige tu número</h2>

<div id="numeros-container">
    {% for numero in range(1, 101) %}
        <button>
            {{ numero }} 
            {% set animales = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯"] %}
            {{ animales[(numero-1) % 10] }}
        </button>
    {% endfor %}
</div>

</body>
</html>
