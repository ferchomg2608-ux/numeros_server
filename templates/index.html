<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Números</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;

            /* Fondo de selva */
            background-image: url("/static/selva.png");
            background-size: cover;       /* Ajusta la imagen a toda la pantalla */
            background-position: center;  /* Centrar la imagen */
            background-repeat: no-repeat;
        }

        input[name="nombre"], input[name="password"] {
            padding: 5px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        /* Grid de 10x10 */
        #numeros-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            justify-items: center;
        }

        /* Botones semi-translúcidos para resaltar sobre la selva */
        #numeros-container button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px 15px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #444;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
        }

        #numeros-container button:hover:not(:disabled) {
            background-color: rgba(200, 255, 200, 0.9);
            transform: scale(1.05);
        }

        #numeros-container button:disabled {
            background-color: rgba(200, 200, 200, 0.8);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h2>Elige tu número</h2>

<!-- Nombre del jugador -->
<form id="nombre-form">
    <input type="text" name="nombre" placeholder="Tu nombre" required>
</form>

<!-- Reinicio solo admin -->
<form method="POST" action="/reset" style="margin-bottom: 20px;">
    <input type="password" name="password" placeholder="Contraseña admin">
    <button type="submit" style="background-color: #ffaaaa;">🔄 Reiniciar juego</button>
</form>

<div id="numeros-container">
    {% set animales = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯"] %}
    {% for numero in range(1, 101) %}
        {% set numero_str = numero|string %}
        {% if numero_str in numeros %}
            <!-- Número bloqueado con nombre del jugador -->
            <button disabled>
                {{ numero }} {{ animales[(numero-1) % 10] }} - {{ numeros[numero_str] }}
            </button>
        {% else %}
            <!-- Número disponible -->
            <form method="POST" action="/pick">
                <input type="hidden" name="numero" value="{{ numero }}">
                <input type="hidden" name="nombre" value="">
                <button type="submit">
                    {{ numero }} {{ animales[(numero-1) % 10] }}
                </button>
            </form>
        {% endif %}
    {% endfor %}
</div>

<script>
    // Poner el nombre del jugador en cada formulario antes de enviar
    const nombreInput = document.querySelector('input[name="nombre"]');
    const forms = document.querySelectorAll('#numeros-container form');

    forms.forEach(form => {
        form.addEventListener('submit', e => {
            const hidden = form.querySelector('input[name="nombre"]');
            hidden.value = nombreInput.value || "Jugador";
        });
    });
</script>

</body>
</html>
